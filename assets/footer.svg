<svg width="900" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes wave1 { 0%{d:path("M0,60 C150,90 300,30 450,60 C600,90 750,30 900,60 L900,120 L0,120 Z")} 50%{d:path("M0,40 C150,10 300,80 450,50 C600,20 750,80 900,40 L900,120 L0,120 Z")} 100%{d:path("M0,60 C150,90 300,30 450,60 C600,90 750,30 900,60 L900,120 L0,120 Z")} }
      @keyframes wave2 { 0%{d:path("M0,70 C180,40 360,100 540,70 C720,40 810,90 900,70 L900,120 L0,120 Z")} 50%{d:path("M0,50 C180,80 360,20 540,50 C720,80 810,30 900,50 L900,120 L0,120 Z")} 100%{d:path("M0,70 C180,40 360,100 540,70 C720,40 810,90 900,70 L900,120 L0,120 Z")} }
      @keyframes wave3 { 0%{d:path("M0,80 C200,50 400,110 600,80 C750,60 840,95 900,80 L900,120 L0,120 Z")} 50%{d:path("M0,60 C200,90 400,30 600,60 C750,80 840,45 900,60 L900,120 L0,120 Z")} 100%{d:path("M0,80 C200,50 400,110 600,80 C750,60 840,95 900,80 L900,120 L0,120 Z")} }
      @keyframes fadein { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
      .w1 { animation: wave1 8s ease-in-out infinite; }
      .w2 { animation: wave2 10s ease-in-out infinite reverse; }
      .w3 { animation: wave3 6s ease-in-out infinite; }
      .txt { animation: fadein 1s ease-out 0.3s both; }
    </style>
  </defs>

  <rect width="900" height="120" fill="#0d1117"/>

  <!-- Wave layers -->
  <path class="w1" d="M0,60 C150,90 300,30 450,60 C600,90 750,30 900,60 L900,120 L0,120 Z" fill="#6C63FF" opacity="0.07"/>
  <path class="w2" d="M0,70 C180,40 360,100 540,70 C720,40 810,90 900,70 L900,120 L0,120 Z" fill="#6C63FF" opacity="0.05"/>
  <path class="w3" d="M0,80 C200,50 400,110 600,80 C750,60 840,95 900,80 L900,120 L0,120 Z" fill="#a78bfa" opacity="0.06"/>

  <!-- Divider top -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="#21262d" stroke-width="1"/>

  <!-- Center text -->
  <g class="txt" text-anchor="middle">
    <text x="450" y="55" font-family="Arial, sans-serif" font-size="14" fill="#484f58">⭐ Star some repos if you find them useful — it genuinely means a lot!</text>
    <text x="450" y="82" font-family="monospace" font-size="11" fill="#6C63FF" opacity="0.6">Made with 💜 by Dhruv Nakum · Los Angeles, CA</text>
  </g>

  <!-- Profile view badge area hint dots -->
  <circle cx="60" cy="60" r="2" fill="#6C63FF" opacity="0.3"/>
  <circle cx="840" cy="60" r="2" fill="#6C63FF" opacity="0.3"/>
</svg>
